<!DOCTYPE html>
<html class="scroll-smooth" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Acceso Administrativo - PROVESA SCC</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0052A5",
                        "accent-yellow": "#FFD100",
                        "accent-red": "#E4002B",
                        "soft-gray": "#F8FAFC"
                    },
                    fontFamily: { "display": ["Work Sans", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 82, 165, 0.1);
        }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,94%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(208,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(210,100%,94%,1) 0, transparent 50%);
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 82, 165, 0.15);
        }

        .btn-wow {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-wow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: transform 0.6s ease;
        }

        .btn-wow:hover::before {
            transform: translate(-50%, -50%) scale(1);
        }

        .btn-wow:active {
            transform: scale(0.98);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-anim {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="font-display bg-mesh min-h-screen flex items-center justify-center p-6 antialiased">

    <!-- Decorative Elements -->
    <div class="fixed top-20 -left-20 w-80 h-80 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="fixed bottom-20 -right-20 w-96 h-96 bg-accent-yellow/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-lg relative z-10">
        <!-- Back Link -->
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-500 hover:text-primary transition-colors mb-8 group">
            <span class="material-icons text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span class="text-sm font-medium">Volver al sitio</span>
        </a>

        <!-- Login Card -->
        <div class="glass-card rounded-[40px] p-8 md:p-12">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-white shadow-sm mb-6 float-anim">
                    <img src="provesa-logo.png" alt="Provesa" class="h-12 w-auto">
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Panel Administrativo</h1>
                <p class="text-slate-500 mt-2 font-medium">Ingrese sus credenciales para continuar</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Usuario</label>
                    <div class="relative">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person_outline</span>
                        <input type="text" placeholder="Ej: admin_provesa" 
                            class="w-full pl-12 pr-4 py-4 bg-white/50 border-slate-200 rounded-2xl focus:border-primary focus:ring-primary/20 input-focus outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Contraseña</label>
                    <div class="relative">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock_open</span>
                        <input type="password" placeholder="••••••••" 
                            class="w-full pl-12 pr-4 py-4 bg-white/50 border-slate-200 rounded-2xl focus:border-primary focus:ring-primary/20 input-focus outline-none">
                    </div>
                </div>

                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="rounded text-primary focus:ring-primary/20 cursor-pointer">
                        <span class="text-xs font-bold text-slate-500 group-hover:text-slate-700 transition-colors">Recordarme</span>
                    </label>
                    <a href="#" class="text-xs font-bold text-primary hover:text-blue-700 transition-colors underline decoration-2 underline-offset-4">¿Olvidó su contraseña?</a>
                </div>

                <button type="submit" 
                    class="btn-wow w-full bg-primary text-white font-extrabold py-5 rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/30 flex items-center justify-center gap-2 text-lg">
                    Acceder al Panel
                    <span class="material-icons">login</span>
                </button>
            </form>

            <!-- Footer info -->
            <div class="mt-12 pt-8 border-t border-slate-200/50 text-center">
                <p class="text-xs text-slate-400 font-medium">
                    &copy; 2026 Provesa SCC. Todos los derechos reservados.<br>
                    Acceso restringido para personal autorizado.
                </p>
            </div>
        </div>
    </div>

</body>

</html>
